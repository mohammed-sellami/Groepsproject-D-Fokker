<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Generator V6 – MVC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">

    <!-- ============================================================
         VIEW  –  Alleen HTML-structuur, géén logica
         ============================================================ -->
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-xl p-8 mb-6">

            <!-- Header -->
            <div class="flex items-center gap-3 mb-6">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                </svg>
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Blog Generator V6</h1>
                </div>
            </div>

            <!-- Invoer -->
            <div class="mb-4">
                <div class="flex gap-3">
                    <input type="text" id="topicInput"
                           placeholder="Voer een onderwerp in (bijv. tafel, smartphone, koffie)"
                           class="flex-1 px-4 py-3 border border-gray-300 rounded-lg
                                  focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"/>
                    <button id="startBtn"
                            class="px-6 py-3 bg-indigo-600 text-white rounded-lg
                                   hover:bg-indigo-700 transition-colors font-medium">
                        Start
                    </button>
                </div>
            </div>

            <!-- Bloglengte selector -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-2">Bloglengte</label>
                <div class="flex gap-2">
                    <button class="length-btn active" data-words="300">
                        300 woorden<br><span class="text-xs font-normal opacity-80">Kort &amp; krachtig</span>
                    </button>
                    <button class="length-btn" data-words="500">
                        500 woorden<br><span class="text-xs font-normal opacity-80">Standaard</span>
                    </button>
                    <button class="length-btn" data-words="800">
                        800 woorden<br><span class="text-xs font-normal opacity-80">Uitgebreid</span>
                    </button>
                </div>
            </div>

            <!-- Foutmelding -->
            <div id="errorBox" class="hidden p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 mb-4"></div>

            <!-- Statusbalk -->
            <div id="statusBox"
                 class="hidden flex items-center gap-3 p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 mb-4">
                <div class="spinner"></div>
                <span id="statusText"></span>
            </div>

            <!-- Subtopics -->
            <div id="subtopicsContainer" class="hidden mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-gray-800">
                        Onderwerpen (<span id="subtopicCount">0</span>)
                        <span id="selectedLengthBadge"
                              class="ml-2 text-sm font-normal px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full"></span>
                    </h2>
                    <div class="flex gap-2">
                        <button id="generateAllBtn"
                                class="hidden px-4 py-2 bg-green-600 text-white rounded-lg
                                       hover:bg-green-700 transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
                                         a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            Genereer alle blogs
                        </button>
                        <button id="downloadBtn"
                                class="hidden px-4 py-2 bg-purple-600 text-white rounded-lg
                                       hover:bg-purple-700 transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
                                         a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            Download alle blogs
                        </button>
                    </div>
                </div>
                <div id="subtopicsList" class="grid gap-3"></div>
            </div>
        </div>

        <!-- Gegenereerde blogs -->
        <div id="blogsContainer" class="space-y-6"></div>
    </div>
    <!-- ============================================================
         EINDE HTML-VIEW
         ============================================================ -->


    <!--
        LAADVOLGORDE is belangrijk:
          1. Model      – data & state (geen afhankelijkheden)
          2. Service    – API-aanroepen (geen afhankelijkheden)
          3. View       – DOM-beheer (geen afhankelijkheden)
          4. Controller – koppelt Model + Service + View
          5. Bootstrap  – start de applicatie
    -->
    <script src="model/BlogModel.js"></script>
    <script src="service/ApiService.js"></script>
    <script src="view/BlogView.js"></script>
    <script src="controller/BlogController.js"></script>

    <!-- Bootstrap: start de applicatie -->
    <script>
        BlogController.init();
    </script>

</body>
</html>
