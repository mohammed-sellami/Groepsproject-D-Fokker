<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Blog Generator v4 – Subtopics & Blogs</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body class="p-6 bg-gray-100">

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">Blog Generator v4</h1>
    
    <input id="topicInput" type="text" placeholder="Voer onderwerp in"
           class="w-full p-2 border rounded mb-3">
    
    <button id="startBtn" onclick="handleStart()"
            class="bg-blue-500 text-white px-4 py-2 rounded mb-3">
        Start
    </button>

    <div id="statusBox" class="hidden flex items-center gap-2 p-2 mb-2 bg-blue-50 border border-blue-200 text-blue-700 rounded">
        <span id="statusText">Laden...</span>
    </div>

    <div id="error" class="hidden p-2 mb-2 bg-red-50 border border-red-200 text-red-700 rounded"></div>

    <h2 class="font-bold mt-4">Subtopics:</h2>
    <div id="output" class="mt-2 space-y-2"></div>

    <h2 class="font-bold mt-4">Blogs:</h2>
    <div id="blogs" class="mt-2 space-y-4"></div>
</div>

<script>
const API_KEY = "AIzaSyByKZeBXryDNr4_2oEkzpQrXaCpGk7lpDk"; // Vul je eigen API-sleutel in
let isLoading = false;

function showError(msg) {
    const errorDiv = document.getElementById("error");
    errorDiv.innerText = msg;
    errorDiv.classList.remove("hidden");
}

function hideError() {
    document.getElementById("error").classList.add("hidden");
}

function showStatus(msg) {
    const statusBox = document.getElementById("statusBox");
    document.getElementById("statusText").innerText = msg;
    statusBox.classList.remove("hidden");
}

function hideStatus() {
    document.getElementById("statusBox").classList.add("hidden");
}

function setLoading(state) {
    isLoading = state;
    const startBtn = document.getElementById("startBtn");
    const topicInput = document.getElementById("topicInput");
    startBtn.disabled = state;
    topicInput.disabled = state;
    startBtn.classList.toggle("bg-gray-400", state);
    startBtn.classList.toggle("cursor-not-allowed", state);
}

// Functie om een blog te genereren per subtopic
async function generateBlog(subtopic, topic) {
    showStatus(`Blog wordt geschreven: ${subtopic}...`);
    const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: `Schrijf een complete blogartikel over "${subtopic}" in de context van "${topic}". 
Schrijf in het Nederlands, informatief en toegankelijk.`
                    }]
                }]
            })
        }
    );
    const data = await response.json();
    const candidates = data.candidates || [];
    if (candidates.length === 0 || !candidates[0].content) {
        return `Geen blog ontvangen voor "${subtopic}"`;
    }
    const parts = candidates[0].content.parts || [];
    return parts[0]?.text || `Geen blog ontvangen voor "${subtopic}"`;
}

async function handleStart() {
    const topic = document.getElementById("topicInput").value.trim();
    if (!topic) return alert("Voer een onderwerp in!");

    hideError();
    setLoading(true);
    showStatus("Onderwerpen worden geladen...");

    const outputDiv = document.getElementById("output");
    const blogsDiv = document.getElementById("blogs");
    outputDiv.innerHTML = "";
    blogsDiv.innerHTML = "";

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Genereer precies 10 belangrijke onderwerpen over "${topic}". Geef alleen de onderwerpen, elk op een nieuwe regel.`
                        }]
                    }]
                })
            }
        );

        const data = await response.json();
        const candidates = data.candidates || [];
        if (candidates.length === 0 || !candidates[0].content) {
            throw new Error("Geen onderwerpen ontvangen van AI.");
        }

        const parts = candidates[0].content.parts || [];
        if (parts.length === 0) {
            throw new Error("Geen tekstdelen ontvangen van AI.");
        }

        const text = parts[0].text || "";
        const subtopics = text.split('\n').map(s => s.trim()).filter(s => s.length > 0);

        // Toon maximaal 10 subtopics
        subtopics.slice(0, 10).forEach((sub, index) => {
            const div = document.createElement("div");
            div.textContent = `${index + 1}. ${sub}`;
            div.className = "p-2 border rounded bg-gray-50";
            outputDiv.appendChild(div);
        });

        // Voor elk subtopic een blog genereren
        for (let i = 0; i < Math.min(10, subtopics.length); i++) {
            const sub = subtopics[i];
            const blogText = await generateBlog(sub, topic);
            const blogDiv = document.createElement("div");
            blogDiv.innerHTML = `<h3 class="font-semibold">${i+1}. ${sub}</h3><p>${blogText}</p>`;
            blogDiv.className = "p-3 border rounded bg-gray-100";
            blogsDiv.appendChild(blogDiv);
        }

    } catch (err) {
        showError("Er is iets misgegaan: " + err.message);
    } finally {
        hideStatus();
        setLoading(false);
    }
}
</script>

</body>
</html>
