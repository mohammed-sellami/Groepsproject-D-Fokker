<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Blog Generator v2 – Alleen 10 Subtopics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-100">

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">Blog Generator v2</h1>
    
    <input id="topicInput" type="text" placeholder="Voer onderwerp in"
           class="w-full p-2 border rounded mb-3">
    
    <button onclick="handleStart()"
            class="bg-blue-500 text-white px-4 py-2 rounded mb-3">
        Start
    </button>

    <!-- Hier verschijnen de subtopics -->
    <div id="output" class="mt-4 space-y-2"></div>
</div>

<script>
const API_KEY = "AIzaSyDA5MrA4BMnnkl1z6Sjly2iLl5NauP1Mng"; // Vul hier je eigen API-sleutel in

async function handleStart() {
    const topic = document.getElementById("topicInput").value.trim();
    if (!topic) return alert("Voer een onderwerp in!");

    const outputDiv = document.getElementById("output");
    outputDiv.innerHTML = "Onderwerpen worden geladen...";

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Genereer precies 10 belangrijke onderwerpen over "${topic}". Geef alleen de onderwerpen, elk op een nieuwe regel.`
                        }]
                    }]
                })
            }
        );

        const data = await response.json();

        // Veilig checken of response er is
        const candidates = data.candidates || [];
        if (candidates.length === 0 || !candidates[0].content) {
            throw new Error("Geen onderwerpen ontvangen van AI.");
        }
        const parts = candidates[0].content.parts || [];
        if (parts.length === 0) {
            throw new Error("Geen tekstdelen ontvangen van AI.");
        }

        const text = parts[0].text || "";

        // Splitsen op nieuwe regel en maximaal 10
        const subtopics = text.split('\n')
                              .map(s => s.trim())
                              .filter(s => s.length > 0);

        // Toon alleen de eerste 10 subtopics
        outputDiv.innerHTML = ""; // eerst leegmaken
        subtopics.slice(0, 10).forEach((sub, index) => {
            const div = document.createElement("div");
            div.textContent = `${index + 1}. ${sub}`;
            div.className = "p-2 border rounded bg-gray-50";
            outputDiv.appendChild(div);
        });

    } catch (err) {
        outputDiv.innerText = "Er is iets misgegaan: " + err.message;
    }
}
</script>

</body>
</html>
